# Project name: celonica-web
# Run with: docker compose up -d

services:
  # ─── Frontend (React / Vite) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: celonica-web-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - celonica_net

  # ─── Backend (Laravel / PHP-FPM) ────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: celonica-web-backend
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
      - keycloak
    restart: unless-stopped
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=celonica
      - DB_USERNAME=celonica_user
      - DB_PASSWORD=celonica_pass
    networks:
      - celonica_net

  # ─── MySQL for Laravel ──────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: celonica-web-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: celonica
      MYSQL_USER: celonica_user
      MYSQL_PASSWORD: celonica_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - celonica_net

  # ─── PostgreSQL for Keycloak ───────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: celonica-web-keycloakdb
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_pass
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - celonica_net

  # ─── Keycloak ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: celonica-web-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - celonica_net

volumes:
  keycloak_db_data:
    name: celonica-web-keycloak-db-data
  db_data:
    name: celonica-web-mysql-data

networks:
  celonica_net:
    name: celonica-web-network
    driver: bridge
