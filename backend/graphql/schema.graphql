"A datetime string in ISO 8601 format"
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

enum AdminRole {
    SUPER_ADMIN @enum(value: "super_admin")
    ADMIN @enum(value: "admin")
    MODERATOR @enum(value: "moderator")
}

type Admin {
    id: ID!
    keycloakSub: String! @rename(attribute: "keycloak_sub")
    email: String!
    name: String!
    nic: String
    mobileNumber: String @rename(attribute: "mobile_number")
    address: String
    dob: String
    gender: String
    role: AdminRole!
    isActive: Boolean! @rename(attribute: "is_active")
    lastLoginAt: DateTime @rename(attribute: "last_login_at")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime @rename(attribute: "updated_at")
}

type DashboardStats {
    totalAdmins: Int!
    activeAdmins: Int!
    totalUsers: Int!
    totalQuestions: Int!
    totalReports: Int!
    pendingReports: Int!
}

type User {
    id: ID!
    keycloakSub: String! @rename(attribute: "keycloak_sub")
    email: String!
    name: String!
    firstName: String! @rename(attribute: "first_name")
    lastName: String! @rename(attribute: "last_name")
    nic: String
    mobileNumber: String @rename(attribute: "mobile_number")
    address: String
    dob: String
    gender: String
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime @rename(attribute: "updated_at")
}

type Question {
    id: ID!
    category: Category @belongsTo
    section: String
    questionTextEn: String! @rename(attribute: "question_text_en")
    questionTextSi: String @rename(attribute: "question_text_si")
    inputType: String! @rename(attribute: "input_type")
    isRepeater: Boolean! @rename(attribute: "is_repeater")
    sortOrder: Int! @rename(attribute: "sort_order")
    isActive: Boolean! @rename(attribute: "is_active")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime @rename(attribute: "updated_at")
}

type UserAnswer {
    id: ID!
    user: User! @belongsTo
    question: Question! @belongsTo
    answerValue: String @rename(attribute: "answer_value")
    iteration: Int!
    isSkipped: Boolean! @rename(attribute: "is_skipped")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime @rename(attribute: "updated_at")
}

type Query {
    "Get the currently authenticated admin"
    me: Admin
        @field(resolver: "App\\GraphQL\\Queries\\AdminQueries@me")

    "Get all admins"
    admins: [Admin!]!
        @field(resolver: "App\\GraphQL\\Queries\\AdminQueries@admins")

    "Get a single admin by ID"
    admin(id: ID! @eq): Admin
        @field(resolver: "App\\GraphQL\\Queries\\AdminQueries@admin")

    "Dashboard overview statistics"
    dashboardStats: DashboardStats!
        @field(resolver: "App\\GraphQL\\Queries\\AdminQueries@dashboardStats")

    "Get the currently authenticated normal user"
    meUser: User
        @field(resolver: "App\\GraphQL\\Queries\\UserQueries@meUser")
    
    "Check if the user needs onboarding"
    needsOnboarding: Boolean!
        @field(resolver: "App\\GraphQL\\Queries\\UserQueries@needsOnboarding")

    "Get all active questions"
    questions: [Question!]!
        @field(resolver: "App\\GraphQL\\Queries\\QuestionQueries@questions")

    "Get user answers"
    myAnswers: [UserAnswer!]!
        @field(resolver: "App\\GraphQL\\Queries\\QuestionQueries@myAnswers")

    "Get root categories"
    categories: [Category!]!
        @field(resolver: "App\\GraphQL\\Queries\\CategoryQueries@categories")

    "Get subcategories by parent slug"
    categoryBySlug(slug: String!): Category
        @field(resolver: "App\\GraphQL\\Queries\\CategoryQueries@categoryBySlug")

    "Get all answers for questions in a specific category"
    categoryAnswers(categoryId: ID!): [UserAnswer!]!
        @field(resolver: "App\\GraphQL\\Queries\\QuestionQueries@categoryAnswers")

    "Get post offices filtered by district"
    postOfficesByDistrict(district: String!): [PostOffice!]!
        @field(resolver: "App\\GraphQL\\Queries\\PostOfficeQueries@postOfficesByDistrict")

    "Get PHI areas filtered by district"
    phiAreasByDistrict(district: String!): [PhiArea!]!
        @field(resolver: "App\\GraphQL\\Queries\\PhiAreaQueries@phiAreasByDistrict")

    "Get TRS areas filtered by district"
    trsAreasByDistrict(district: String!): [TrsArea!]!
        @field(resolver: "App\\GraphQL\\Queries\\TrsAreaQueries@trsAreasByDistrict")

    "Grama Niladharis"
    gramaNiladharis(search: String @builder(method: "App\\Models\\GramaNiladhari@scopeSearch")): [GramaNiladhari!]! @paginate(defaultCount: 50)
    gramaNiladhari(id: ID! @eq): GramaNiladhari @find
    gnByCoordinates(lat: Float!, lng: Float!): GramaNiladhari @field(resolver: "App\\GraphQL\\Queries\\GnByCoordinates")
    "Housing Data Aggregate"
    housingData(district_id: ID, city_code: String, gn_id: ID): HousingDataAggregate @field(resolver: "App\\GraphQL\\Queries\\HousingDataQuery")

    "Polices"
    polices(search: String @builder(method: "App\\Models\\Police@scopeSearch")): [Police!]! @paginate(defaultCount: 50)
    police(id: ID! @eq): Police @find

    "Users"
    users(search: String @where(operator: "like")): [User!]! @paginate(defaultCount: 10)
    user(id: ID @eq): User @find

    "Districts"
    districts(search: String, first: Int, page: Int): [District!]!
        @field(resolver: "App\\GraphQL\\Queries\\DistrictQueries@getDistricts")

    "PProvinces"
    pProvinces: [PProvince!]! @all

    "PDistricts"
    pDistricts: [PDistrict!]! @all
    pDistrict(id: ID! @eq): PDistrict @find
}

type District {
    code: String!
    nameEn: String
    nameSi: String
    nameTa: String
}

type Category {
    id: ID!
    parent: Category
    children: [Category!]
    ancestors: [Category!]!
    questions: [Question!]
    slug: String!
    nameEn: String! @rename(attribute: "name_en")
    nameSi: String! @rename(attribute: "name_si")
    imagePath: String @rename(attribute: "image_path")
    sortOrder: Int! @rename(attribute: "sort_order")
    progress: Float! @field(resolver: "App\\GraphQL\\Queries\\CategoryQueries@progress")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime @rename(attribute: "updated_at")
}

type Mutation {
    "Register a new admin linked to a Keycloak user"
    registerAdmin(
        keycloakSub: String!
        email: String!
        name: String!
        role: AdminRole! = ADMIN
    ): Admin!
        @field(resolver: "App\\GraphQL\\Mutations\\AdminMutations@registerAdmin")

    "Update an admin's role"
    updateAdminRole(id: ID!, role: AdminRole!): Admin!
        @field(resolver: "App\\GraphQL\\Mutations\\AdminMutations@updateAdminRole")

    "Deactivate an admin account"
    deactivateAdmin(id: ID!): Admin!
        @field(resolver: "App\\GraphQL\\Mutations\\AdminMutations@deactivateAdmin")

    "Reactivate an admin account"
    activateAdmin(id: ID!): Admin!
        @field(resolver: "App\\GraphQL\\Mutations\\AdminMutations@activateAdmin")

    "Register a normal user or admin via Super Admin"
    registerUser(
        email: String!
        firstName: String!
        lastName: String!
        nic: String
        password: String!
        mobileNumber: String
        role: String! # USER, ADMIN, SUPER_ADMIN
    ): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@registerUser")

    "Complete onboarding for a first-time Keycloak user"
    completeUserOnboarding(
        firstName: String!
        lastName: String!
        nic: String!
        mobileNumber: String!
        address: String!
        dob: String!
        gender: String!
    ): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\OnboardingMutations@completeUserOnboarding")

    "Update user profile information"
    updateUserProfile(
        nic: String
        mobileNumber: String
        address: String
        dob: String
        gender: String
    ): User!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@updateUserProfile")

    "Create a new question"
    createQuestion(
        categoryId: ID @rename(attribute: "category_id")
        section: String
        questionTextEn: String! @rename(attribute: "question_text_en")
        questionTextSi: String @rename(attribute: "question_text_si")
        inputType: String! @rename(attribute: "input_type")
        isRepeater: Boolean @rename(attribute: "is_repeater")
        sortOrder: Int! @rename(attribute: "sort_order")
    ): Question!
        @field(resolver: "App\\GraphQL\\Mutations\\QuestionMutations@createQuestion")

    "Update an existing question"
    updateQuestion(
        id: ID!
        categoryId: ID @rename(attribute: "category_id")
        section: String
        questionTextEn: String @rename(attribute: "question_text_en")
        questionTextSi: String @rename(attribute: "question_text_si")
        inputType: String @rename(attribute: "input_type")
        isRepeater: Boolean @rename(attribute: "is_repeater")
        sortOrder: Int @rename(attribute: "sort_order")
        isActive: Boolean @rename(attribute: "is_active")
    ): Question!
        @field(resolver: "App\\GraphQL\\Mutations\\QuestionMutations@updateQuestion")

    "Delete a question"
    deleteQuestion(id: ID!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\QuestionMutations@deleteQuestion")

    "Answer a question"
    answerQuestion(
        questionId: ID!
        iteration: Int = 1
        answerValue: String
        isSkipped: Boolean!
    ): UserAnswer!
        @field(resolver: "App\\GraphQL\\Mutations\\QuestionMutations@answerQuestion")

    "Create a new category"
    createCategory(
        parentId: ID @rename(attribute: "parent_id")
        slug: String!
        nameEn: String! @rename(attribute: "name_en")
        nameSi: String! @rename(attribute: "name_si")
        imagePath: String @rename(attribute: "image_path")
        sortOrder: Int = 0 @rename(attribute: "sort_order")
    ): Category!
        @field(resolver: "App\\GraphQL\\Mutations\\CategoryMutations@createCategory")

    "Update an existing category"
    updateCategory(
        id: ID!
        slug: String
        nameEn: String @rename(attribute: "name_en")
        nameSi: String @rename(attribute: "name_si")
        imagePath: String @rename(attribute: "image_path")
        sortOrder: Int @rename(attribute: "sort_order")
    ): Category!
        @field(resolver: "App\\GraphQL\\Mutations\\CategoryMutations@updateCategory")

    "Delete a category"
    deleteCategory(id: ID!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\CategoryMutations@deleteCategory")

    "Update Police Mapping"
    updatePoliceMapping(
        code: String!
        psId: String @rename(attribute: "ps_id")
        psName: String! @rename(attribute: "ps_name")
        psNameSi: String @rename(attribute: "ps_name_si")
        psNameTa: String @rename(attribute: "ps_name_ta")
    ): Police!
        @field(resolver: "App\\GraphQL\\Mutations\\PoliceMutations@updatePoliceMapping")

    "Update GND Post Office Mapping"
    updateGndPostOfficeMapping(
        gndId: ID!
        postOfficeId: ID
    ): GramaNiladhari!
        @field(resolver: "App\\GraphQL\\Mutations\\PostOfficeMutations@updateGndPostOfficeMapping")
}

type PGn {
    id: ID!
    ccode: String @rename(attribute: "CCODE")
    gramaNiladhariId: ID @rename(attribute: "grama_niladhari_id")
    gnName: String @rename(attribute: "gn_name")
    populationBoth: Int @rename(attribute: "population_both")
    populationMale: Int @rename(attribute: "population_male")
    populationFemale: Int @rename(attribute: "population_female")
    age_0_14: Int
    age_15_59: Int
    age_60_64: Int
    age_65_above: Int
}

type GramaNiladhari {
    id: ID!
    provinceCode: String @rename(attribute: "province_code")
    PCCODE: String
    districtCode: String @rename(attribute: "district_code")
    DCCODE: String
    divisionalSecretariatCode: String @rename(attribute: "divisional_secretariat_code")
    DSCCODE: String
    code: String
    CCODE: String
    nameSi: String @rename(attribute: "name_si")
    nameEn: String @rename(attribute: "name_en")
    nameTa: String @rename(attribute: "name_ta")
    proEn: String @rename(attribute: "pro_en")
    proSi: String @rename(attribute: "pro_si")
    proTa: String @rename(attribute: "pro_ta")
    disEn: String @rename(attribute: "dis_en")
    disSi: String @rename(attribute: "dis_si")
    disTa: String @rename(attribute: "dis_ta")
    dsEn: String @rename(attribute: "ds_en")
    dsSi: String @rename(attribute: "ds_si")
    dsTa: String @rename(attribute: "ds_ta")
    police: Police @hasOne
    postOffice: PostOffice @belongsTo
    pGn: PGn @hasOne
    pDistrict: PDistrict @belongsTo
    gnEconomy: GnEconomy @hasOne
}

type Police {
    id: ID!
    ccode: String
    gndId: String @rename(attribute: "gnd_id")
    name: String
    provinceId: String @rename(attribute: "province_id")
    districtId: String @rename(attribute: "district_id")
    dsdId: String @rename(attribute: "dsd_id")
    pdId: String @rename(attribute: "pd_id")
    gndNum: String @rename(attribute: "gnd_num")
    lat: String
    lng: String
    psId: String @rename(attribute: "ps_id")
    psName: String @rename(attribute: "ps_name")
    psNameSi: String @rename(attribute: "ps_name_si")
    psNameTa: String @rename(attribute: "ps_name_ta")
    distanceToThePoliceStation: String @rename(attribute: "distance_to_the_police_station")
    gramaNiladhari: GramaNiladhari @belongsTo
}

type PostOffice {
    id: ID!
    countryCode: String @rename(attribute: "country_code")
    province: String
    provinceCode: String @rename(attribute: "province_code")
    district: String
    disid: String
    dsAga: String @rename(attribute: "ds_aga")
    dsCode: String @rename(attribute: "ds_code")
    postalCode: String @rename(attribute: "postal_code")
    placeNameEnglish: String @rename(attribute: "place_name_english")
    sinhala: String
    tamil: String
    latitude: Float
    longitude: Float
    accuracy: String
    gramaNiladharis: [GramaNiladhari!] @hasMany
}

type PhiArea {
    id: ID!
    ccode: String
    code: String
    location: String
    fullLocationName: String @rename(attribute: "full_location_name")
    locationType: String @rename(attribute: "location_type")
    nameSi: String @rename(attribute: "name_si")
    nameEn: String @rename(attribute: "name_en")
    nameTa: String @rename(attribute: "name_ta")
    district: String
}

type TrsArea {
    id: ID!
    code: String
    location: String
    fullLocationName: String @rename(attribute: "full_location_name")
    locationType: String @rename(attribute: "location_type")
    nameSi: String @rename(attribute: "name_si")
    nameEn: String @rename(attribute: "name_en")
    nameTa: String @rename(attribute: "name_ta")
    district: String
}

type PProvince {
    id: ID!
    admin1NameEn: String @rename(attribute: "admin1Name_en")
    admin1NameSi: String @rename(attribute: "admin1Name_si")
    admin1NameTa: String @rename(attribute: "admin1Name_ta")
    admin1Pcode: String
    populationBoth: Int
    populationMale: Int
    populationFemale: Int
    districts: [PDistrict!] @hasMany
}

type PDistrict {
    id: ID!
    admin2NameEn: String @rename(attribute: "admin2Name_en")
    admin2NameSi: String @rename(attribute: "admin2Name_si")
    admin2NameTa: String @rename(attribute: "admin2Name_ta")
    admin2Pcode: String
    admin1Pcode: String
    populationBoth: Int
    populationMale: Int
    populationFemale: Int
    pProvince: PProvince @belongsTo
    gramaNiladharis: [GramaNiladhari!] @hasMany
}

type PGn {
    id: ID!
    gnName: String @rename(attribute: "gn_name")
    populationBoth: Int @rename(attribute: "population_both")
    populationMale: Int @rename(attribute: "population_male")
    populationFemale: Int @rename(attribute: "population_female")
    age_0_14: Int
    age_15_59: Int
    age_60_64: Int
    age_65_above: Int
    gramaNiladhari: GramaNiladhari @belongsTo
}

type HousingDataAggregate {
    location_name: String
    total_housing_units: Int
    y_2011: Int
    y_2010: Int
    y_2009: Int
    y_2008: Int
    y_2007: Int
    y_2006: Int
    y_2005: Int
    y_2000_2004: Int
    y_1995_1999: Int
    y_1990_1994: Int
    y_1980_1989: Int
    before_80: Int
}

type GnEconomy {
    id: ID!
    name: String
    gn_number: String
    total: Int
    employed: Int
    unemployed: Int
    economically_not_active: Int
}
